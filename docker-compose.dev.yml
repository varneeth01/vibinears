name: vibinears-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: vibinears-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibinears_dev
      POSTGRES_USER: vibinears
      POSTGRES_PASSWORD: vibinears_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibinears -d vibinears_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vibinears-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: vibinears-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: vibinears
      MONGO_INITDB_ROOT_PASSWORD: vibinears_dev_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: vibinears-api-dev
    restart: unless-stopped
    env_file:
      - .env.development
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app/services/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    command: >
      uvicorn services.api.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_dev_data:
  redis_dev_data:
  mongodb_dev_data:
