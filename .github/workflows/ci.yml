name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  security-file-check:
    name: Security File Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block secret-like files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)|\.pem$|\.key$|\.p12$|\.pfx$|service-account.*\.json|google-services\.json|GoogleService-Info\.plist'; then
            echo "Secret-like file is tracked by Git."
            exit 1
          fi

  api-checks:
    name: API Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app || true

      - name: Pytest
        run: pytest

  docker-build-api:
    name: Docker Build API
    runs-on: ubuntu-latest
    needs:
      - security-file-check
      - api-checks

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infra/docker/api.Dockerfile -t vibinears-api:test .
